# .goreleaser.yaml
version: 2
project_name: gitpulsemlc

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    main: ./cmd/tui
    binary: gitpulse
    ldflags:
      - -s -w -X main.version={{.Version}}
    trimpath: true

archives:
  - format: tar.gz
    # use zip for windows archives
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE
      - README.md
      - README-de.md
      - docs/gitpulse.1
      - docs/json_schema.md
      - docs/schema.json
      - config/repos.ini.example

checksum:
  name_template: 'checksums.txt'

snapshot:
  name_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - 'README'
