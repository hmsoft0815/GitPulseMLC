<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 440" width="760" height="440" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace">
  <!-- Background -->
  <rect width="760" height="440" rx="10" fill="#1e1e2e"/>
  <!-- Title bar -->
  <rect width="760" height="36" rx="10" fill="#181825"/>
  <rect y="26" width="760" height="10" fill="#181825"/>
  <!-- Traffic lights -->
  <circle cx="20" cy="18" r="6" fill="#f38ba8"/>
  <circle cx="40" cy="18" r="6" fill="#f9e2af"/>
  <circle cx="60" cy="18" r="6" fill="#a6e3a1"/>
  <!-- Title -->
  <text x="380" y="23" fill="#6c7086" font-size="12" text-anchor="middle">gitpulse — terminal</text>

  <!-- Header line -->
  <text x="20" y="65" fill="#89b4fa" font-size="12">GitPulseMLC</text>
  <text x="130" y="65" fill="#6c7086" font-size="12">v1.1.0  ·  Scanning 24 repositories...</text>
  <text x="680" y="65" fill="#a6e3a1" font-size="12">✓ done 142ms</text>

  <line x1="20" y1="74" x2="740" y2="74" stroke="#313244" stroke-width="1"/>

  <!-- Column headers -->
  <text x="20"  y="92" fill="#6c7086" font-size="11">REPOSITORY</text>
  <text x="300" y="92" fill="#6c7086" font-size="11">BRANCH</text>
  <text x="400" y="92" fill="#6c7086" font-size="11">STATUS</text>
  <text x="520" y="92" fill="#6c7086" font-size="11">CHANGES</text>
  <text x="640" y="92" fill="#6c7086" font-size="11">SYNC</text>
  <line x1="20" y1="98" x2="740" y2="98" stroke="#313244" stroke-width="1"/>

  <!-- Row 1 - dirty -->
  <rect x="14" y="103" width="732" height="22" rx="3" fill="#313244" opacity="0.4"/>
  <text x="20"  y="118" fill="#cdd6f4" font-size="12">~/dev/mlcauth</text>
  <text x="300" y="118" fill="#cba6f7" font-size="12">master</text>
  <text x="400" y="118" fill="#f9e2af" font-size="12">● dirty</text>
  <text x="520" y="118" fill="#f9e2af" font-size="12">+5 .go  +2 .html</text>
  <text x="640" y="118" fill="#a6e3a1" font-size="12">↑3 ahead</text>

  <!-- Row 2 - clean -->
  <text x="20"  y="140" fill="#585b70" font-size="12">~/dev/pdfserver</text>
  <text x="300" y="140" fill="#585b70" font-size="12">main</text>
  <text x="400" y="140" fill="#a6e3a1" font-size="12">✓ clean</text>
  <text x="520" y="140" fill="#585b70" font-size="12">—</text>
  <text x="640" y="140" fill="#a6e3a1" font-size="12">✓ synced</text>

  <!-- Row 3 - stale branch warning -->
  <rect x="14" y="147" width="732" height="22" rx="3" fill="#313244" opacity="0.4"/>
  <text x="20"  y="162" fill="#cdd6f4" font-size="12">~/dev/mlcgo-vps</text>
  <text x="300" y="162" fill="#cba6f7" font-size="12">feature/gallery</text>
  <text x="400" y="162" fill="#f38ba8" font-size="12">⚠ stale 34d</text>
  <text x="520" y="162" fill="#585b70" font-size="12">—</text>
  <text x="640" y="162" fill="#f9e2af" font-size="12">↓1 behind</text>

  <!-- Row 4 - dirty -->
  <text x="20"  y="184" fill="#cdd6f4" font-size="12">~/dev/txt2zimage</text>
  <text x="300" y="184" fill="#cba6f7" font-size="12">main</text>
  <text x="400" y="184" fill="#f9e2af" font-size="12">● dirty</text>
  <text x="520" y="184" fill="#f9e2af" font-size="12">+12 .py  +1 .yaml</text>
  <text x="640" y="184" fill="#a6e3a1" font-size="12">✓ synced</text>

  <!-- Row 5 - clean -->
  <rect x="14" y="191" width="732" height="22" rx="3" fill="#313244" opacity="0.4"/>
  <text x="20"  y="206" fill="#585b70" font-size="12">~/dev/marksafe</text>
  <text x="300" y="206" fill="#585b70" font-size="12">master</text>
  <text x="400" y="206" fill="#a6e3a1" font-size="12">✓ clean</text>
  <text x="520" y="206" fill="#585b70" font-size="12">—</text>
  <text x="640" y="206" fill="#a6e3a1" font-size="12">✓ synced</text>

  <!-- Row 6 -->
  <text x="20"  y="228" fill="#cdd6f4" font-size="12">~/dev/mlcterm</text>
  <text x="300" y="228" fill="#cba6f7" font-size="12">dev/websocket</text>
  <text x="400" y="228" fill="#f9e2af" font-size="12">● dirty</text>
  <text x="520" y="228" fill="#f9e2af" font-size="12">+8 .go  +3 .svelte</text>
  <text x="640" y="228" fill="#f38ba8" font-size="12">↑7 ahead</text>

  <!-- Row 7 - clean -->
  <rect x="14" y="235" width="732" height="22" rx="3" fill="#313244" opacity="0.4"/>
  <text x="20"  y="250" fill="#585b70" font-size="12">~/dev/d2rquickcheck</text>
  <text x="300" y="250" fill="#585b70" font-size="12">master</text>
  <text x="400" y="250" fill="#a6e3a1" font-size="12">✓ clean</text>
  <text x="520" y="250" fill="#585b70" font-size="12">—</text>
  <text x="640" y="250" fill="#a6e3a1" font-size="12">✓ synced</text>

  <!-- dimmed rows hint -->
  <text x="20" y="272" fill="#45475a" font-size="11">  … 17 more repositories (clean, hidden in compact mode)</text>

  <line x1="20" y1="282" x2="740" y2="282" stroke="#313244" stroke-width="1"/>

  <!-- Summary bar -->
  <text x="20"  y="302" fill="#6c7086" font-size="11">SUMMARY</text>
  <text x="20"  y="322" fill="#f38ba8" font-size="12">● 3 dirty</text>
  <text x="120" y="322" fill="#f9e2af" font-size="12">⚠ 1 stale branch</text>
  <text x="270" y="322" fill="#f38ba8" font-size="12">↑ 1 unpushed</text>
  <text x="390" y="322" fill="#a6e3a1" font-size="12">✓ 20 clean</text>
  <text x="490" y="322" fill="#6c7086" font-size="12">24 total</text>

  <!-- HTML report line -->
  <line x1="20" y1="336" x2="740" y2="336" stroke="#313244" stroke-width="1"/>
  <text x="20" y="356" fill="#6c7086" font-size="11">$</text>
  <text x="32" y="356" fill="#cdd6f4" font-size="11">gitpulse --output html --compact &gt; report.html</text>
  <text x="20" y="374" fill="#6c7086" font-size="11">$</text>
  <text x="32" y="374" fill="#cdd6f4" font-size="11">gitpulse --output json | jq '.[] | select(.dirty == true)'</text>

  <!-- cursor blink -->
  <rect x="20" y="385" width="8" height="14" fill="#89b4fa" opacity="0.8"/>
</svg>
