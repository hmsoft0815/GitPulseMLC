id:        "gitpulse"
name:      "GitPulseMLC"
version:   "1.1.0"
status:    "stable"
category:  "Development Tools"
license:   "MIT"
platforms:
  - macOS
  - Linux

github:    "https://github.com/hmsoft0815/GitPulseMLC"
slogan_en: "Monitor the heartbeat of all your local Git repositories in a single, high-performance terminal dashboard."
slogan_de: "Überwachen Sie den Herzschlag all Ihrer lokalen Git-Repositories in einem einzigen, hochperformanten Terminal-Dashboard."
openapi:   ""
screenshots:
  - "terminal-dashboard.svg"

downloads:
  free: true
  windows: ""
  linux:   "gitpulse-linux"
  macos:   "gitpulse-macos"

features:
  - icon:     "zap"
    title_en: "Concurrent Scanning"
    title_de: "Gleichzeitiges Scannen"
    desc_en:  "Leverages Go routines to scan hundreds of repositories in a heartbeat."
    desc_de:  "Nutzt Go-Routinen, um hunderte Repositories in Millisekunden zu scannen."

  - icon:     "shield"
    title_en: "Passive & Safe"
    title_de: "Passiv & Sicher"
    desc_en:  "Operates on a strict read-only principle without modifying your files."
    desc_de:  "Arbeitet nach einem strikten Read-Only-Prinzip, ohne Ihre Dateien zu verändern."

  - icon:     "monitor"
    title_en: "Visual Dashboard"
    title_de: "Visuelles Dashboard"
    desc_en:  "Modern, color-coded terminal output with dynamic alignment and styling."
    desc_de:  "Moderne, farbcodierte Terminal-Ausgabe mit dynamischer Ausrichtung."

  - icon:     "file-code"
    title_en: "Multiple Outputs"
    title_de: "Verschiedene Formate"
    desc_en:  "Export results as high-contrast HTML reports or structured JSON data."
    desc_de:  "Exportieren Sie Ergebnisse als kontrastreiche HTML-Berichte oder JSON-Daten."

  - icon:     "target"
    title_en: "Compact Mode"
    title_de: "Kompakt-Modus"
    desc_en:  "Hide clean repositories and focus only on those requiring immediate action."
    desc_de:  "Blenden Sie saubere Repositories aus und fokussieren Sie sich auf das Wesentliche."

  - icon:     "clock"
    title_en: "Stale Branch Detection"
    title_de: "Veraltete Branches"
    desc_en:  "Automatically flags local branches that haven't been touched in over 30 days."
    desc_de:  "Markiert automatisch lokale Branches, die seit über 30 Tagen nicht bewegt wurden."

  - icon:     "folder-tree"
    title_en: "Path Shortening"
    title_de: "Pfad-Verkürzung"
    desc_en:  "Tidy up your dashboard with configurable path replacement for deep structures."
    desc_de:  "Halten Sie Ihr Dashboard übersichtlich durch konfigurierbare Pfad-Ersetzungen."

  - icon:     "activity"
    title_en: "Deep Git Insights"
    title_de: "Tiefe Git-Einblicke"
    desc_en:  "Tracks dirty worktrees, file-type summaries, and ahead/behind commit counts."
    desc_de:  "Zeigt ungesicherte Änderungen, Dateityp-Zusammenfassungen und Sync-Status."
